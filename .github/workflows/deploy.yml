name: Deploy to AWS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: among-us-mlops
  ECS_SERVICE: among-us-mlops-service
  ECS_CLUSTER: among-us-mlops-cluster
  ECS_TASK_DEFINITION: among-us-mlops-task
  S3_BUCKET: among-us-mlops-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # - name: Build Docker image for backend
      #   id: docker_build
      #   env:
      #     ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      #     IMAGE_TAG: ${{ github.sha }}
      #   run: |
      #     docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
      #     docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
      #     echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # - name: Push Docker image to ECR
      #   env:
      #     ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      #     IMAGE_TAG: ${{ github.sha }}
      #   run: |
      #     docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
      #     docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # - name: Deploy backend to ECS
      #   if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      #   uses: aws-actions/ecs-deploy-task-definition@v1
      #   with:
      #     task-definition: ${{ env.ECS_TASK_DEFINITION }}.json
      #     service: ${{ env.ECS_SERVICE }}
      #     cluster: ${{ env.ECS_CLUSTER }}
      #     wait-for-service-stability: true

      - name: Build frontend
        run: |
          mkdir -p dist
          cp index.html dist/
          cp -r assets dist/ 2>/dev/null || true

      - name: Deploy frontend to S3
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }}/ --delete
          aws s3 cp dist/index.html s3://${{ env.S3_BUCKET }}/index.html --cache-control "no-cache"

      - name: Invalidate CloudFront cache
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          DISTRIBUTION_ID=${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
          if [ ! -z "$DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths "/*"
          fi

      - name: Deployment Summary
        run: |
          echo "=== Deployment Summary ==="
          echo "Backend image: ${{ steps.docker_build.outputs.image }}"
          echo "Frontend S3 bucket: ${{ env.S3_BUCKET }}"
          echo "ECS Cluster: ${{ env.ECS_CLUSTER }}"
          echo "ECS Service: ${{ env.ECS_SERVICE }}"
